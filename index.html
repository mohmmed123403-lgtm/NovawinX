<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصنع حمو OS</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: #fff; padding: 20px; }
        input { width: 300px; padding: 12px; margin: 10px; border-radius: 8px; border: none; font-size: 16px; }
        button { padding: 15px 30px; background: #ff0050; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #result { margin-top: 30px; background: #222; padding: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h1>🔥 EVERYBODY اصنع نظامك بنفسك مع حمو OS 🔥</h1>
    <input id="name" placeholder="اكتب اسمك هنا">
    <br>
    <input id="request" placeholder="عايز نظام عامل ازاي؟">
    <br>
    <button onclick="createOS()">اصنع نظامي دلوقتي</button>
    <div id="result"></div>

    <script>
        // ========================================================
        // 👈👈👈 المكان الوحيد اللي هتعدل فيه اهو 👈👈👈
        // ========================================================
        const NOTIFY_URL = "حط_لينك_الوسيط_هنا"; // مثال: https://ntfy.sh/hamo-os-اسم-سري-جدا
        // ========================================================

        async function createOS() {
            const name = document.getElementById('name').value;
            const request = document.getElementById('request').value;
            const resultDiv = document.getElementById('result');

            if (!name ||!request) {
                alert("اكتب اسمك وطلبك الاول يا نجم");
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = "<h3>جاري صنع النظام... ⏳</h3>";

            // ده ذكاء اصطناعي بسيط عشان المثال
            let size = Math.floor(Math.random() * 500) + 500; // 500-1000 ميجا
            let systemName = request.split(' ')[0] + "OS";
            let isGood = size < 1000;

            resultDiv.innerHTML = `
                <h3>مبروك يا ${name}! 🎉</h3>
                <h2>روشتة نظامك "${systemName}" جاهزة</h2>
                <p><b>الحجم المتوقع:</b> ${size}MB</p>
                <p>لو نظامك عجب حمو هينشره باسمك 👑</p>
            `;

            // لو النظام حلو، ابعت تنبيه
            if (isGood && NOTIFY_URL!== "حط_لينك_الوسيط_هنا") {
                fetch(NOTIFY_URL, {
                    method: 'POST',
                    body: `🔥 نظام جديد: ${systemName} | صنعه: ${name} | حجمه: ${size}MB`,
                    headers: { 'Title': 'حمو OS - نظام جديد' }
                });
            }
        }
    </script>
</body>
</html>
