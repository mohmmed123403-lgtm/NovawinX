<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>النسخة الاحترافية - تشغيل آمن</title>
</head>
<body style="margin:0; padding:0; overflow:hidden;">

    <div id="secure-layer"></div>

    <script>
        // الرابط السحري بتاعك (النسخة اللي بفلوس بتعتمد على الرابط ده)
        const myPremiumFile = 'رابط_النسخة_الخام_بتاعتك_هنا';

        async function launchProVersion() {
            try {
                const response = await fetch(myPremiumFile);
                if (!response.ok) throw new Error('تعذر الوصول للنسخة');
                
                const content = await response.text();
                
                // الحركة اللي بفلوس: بنمسح الصفحة القديمة ونحط صفحتك إنتي مكانها
                document.open();
                document.write(content);
                document.close();
                
                console.log("النسخة البريميوم تعمل الآن بنجاح!");
            } catch (err) {
                document.body.innerHTML = `<div style="text-align:center; margin-top:50px;">
                    <h2>خطأ في سحب النسخة</h2>
                    <p>تأكدي من الرابط أو اتصال الإنترنت</p>
                </div>`;
            }
        }

        // تشغيل المحرك فوراً
        launchProVersion();
    </script>
</body>
</html>
