<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-WinX - نظام الأسطورة</title>
    <style>
        /* التنسيق العام للموقع */
        body { margin: 0; padding: 0; background-color: #0d1117; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .main-container { border: 2px solid #38bdf8; border-radius: 30px; background: radial-gradient(circle at center, #161b22 0%, #0d1117 100%); padding: 50px 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 40px rgba(56, 189, 248, 0.2); position: relative; }

        .logo-text { font-size: 3.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8, 0 0 40px #00d2ff; letter-spacing: 5px; margin-bottom: 5px; font-style: italic; }
        .tagline { color: #38bdf8; font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; font-weight: bold; }

        .product-box { background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        
        .download-button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 20px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 1.3rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.4s; width: 100%; display: block; text-decoration: none; }
        .download-button:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4); }

        /* نافذة الدفع (البوتوم شيت) */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: #161b22; border-top: 4px solid #38bdf8; border-radius: 30px 30px 0 0; padding: 30px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; text-align: center; }
        .bottom-sheet.active { bottom: 0; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        .payment-methods { display: flex; justify-content: space-around; margin: 15px 0; }
        .method { padding: 10px; border-radius: 10px; border: 1px solid #333; width: 45%; font-size: 0.8rem; font-weight: bold; }
        .vodafone { border-color: #e60000; color: #ff4d4d; }
        .instapay { border-color: #833ab4; color: #c13584; }

        .cash-number { color: #fff; font-weight: bold; font-size: 1.8rem; display: block; margin: 20px 0; background: #000; padding: 15px; border-radius: 15px; border: 2px dashed #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .input-field { width: 85%; padding: 18px; margin: 15px 0; border-radius: 12px; border: 1px solid #333; background: #0d1117; color: #fff; text-align: center; font-size: 1.2rem; }
        .verify-btn { background: #10b981; color: white; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-text">M-WinX</div>
        <div class="tagline">ULTIMATE SYSTEM 2026</div>
        
        <div class="product-box">
            <h2 style="color:#38bdf8; margin:0;">إصدار الأسطورة</h2>
            <p style="font-size: 0.9rem; color:#8b949e;">نظام مخصص للمبدعين والمحترفين</p>
        </div>

        <button onclick="toggleSheet(true)" class="download-button">🚀 سحب النظام الآن</button>

        <div style="text-align: center; margin-top: 40px; width: 100%;">
            <img src="https://visitor-badge.laobi.icu/badge?page_id=m-winx.github.io" alt="visitors">
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="toggleSheet(false)"></div>

    <div id="bottomSheet" class="bottom-sheet">
        <div style="width:40px; height:5px; background:#333; margin:0 auto 15px; border-radius:10px;"></div>
        <h3 style="color: #38bdf8; margin-top:0;">بوابة دفع M-WinX</h3>
        
        <div class="payment-methods">
            <div class="method vodafone">Vodafone Cash</div>
            <div class="method instapay">InstaPay</div>
        </div>
        
        <p style="color:#aaa; font-size: 0.9rem;">حول للمدير مودي على الرقم الموحد:</p>
        <span class="cash-number">01002023793</span>
        
        <p style="font-size: 0.8rem; color: #8b949e;">أدخل رقم هاتفك الذي حولت منه للتأكيد:</p>
        <input type="number" id="clientPhone" class="input-field" placeholder="01XXXXXXXXX">
        
        <button onclick="startVerification()" class="verify-btn">تأكيد عملية الدفع</button>
        <div id="statusMsg" style="margin-top:20px; font-weight:bold;"></div>
        <p onclick="toggleSheet(false)" style="margin-top:10px; color:#555; cursor:pointer;">إلغاء</p>
    </div>

    <script>
        function toggleSheet(show) {
            document.getElementById('bottomSheet').classList.toggle('active', show);
            document.getElementById('overlay').classList.toggle('active', show);
        }

        function startVerification() {
            const phone = document.getElementById('clientPhone').value;
            const status = document.getElementById('statusMsg');

            if (phone.length < 11) {
                status.style.color = "#ff4d4d";
                status.innerHTML = "❌ الرقم غير صحيح!";
                return;
            }

            status.style.color = "#fbbf24";
            status.innerHTML = "⌛ جاري مراجعة التحويل لـ M-WinX...";

            setTimeout(() => {
                status.style.color = "#10b981";
                status.innerHTML = "✅ تم التحقق! يبدأ تحميل M-WinX-Ultra.iso...";
                // هنا تضع رابط ملف التحميل الحقيقي مستقبلاً
                window.location.href = "#"; 
            }, 4000);
        }
    </script>

</body>
</html>
